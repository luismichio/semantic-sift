name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-13 is Intel, macos-14 is Apple Silicon (M1/M2/M3)
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust
        if: startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'windows')
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_SKIP: "pp* cp36-* cp37-* cp38-* cp39-* *linux*" # Skip Linux wheels due to ONNX glibc mismatch (Linux users build from source)
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: "dnf install -y openssl-devel perl && curl https://sh.rustup.rs -sSf | sh -s -- --default-toolchain stable -y"
          CIBW_ENVIRONMENT_LINUX: "PATH=$PATH:$HOME/.cargo/bin"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist
        run: |
          uv pip install build --system
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.

      - name: Extract changelog section for release notes
        id: changelog
        run: |
          python - <<'EOF'
          import re, os
          with open("doc/CHANGELOG.md") as f:
              content = f.read()
          match = re.search(r'(## \[\d+\.\d+\.\d+\].*?)(?=\n## \[|\Z)', content, re.DOTALL)
          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write("notes<<EOF_NOTES\n")
              out.write(notes + "\n")
              out.write("EOF_NOTES\n")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
