name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_wheel:
    name: Build pure-Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel and sdist
        run: |
          uv pip install build --system
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/*

  upload_pypi:
    needs: [build_wheel]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
        # Uses OIDC trusted publishing — no API token needed.

      - name: Extract changelog section for release notes
        id: changelog
        run: |
          python - <<'EOF'
          import re, os
          with open("doc/CHANGELOG.md") as f:
              content = f.read()
          match = re.search(r'(## \[\d+\.\d+\.\d+\].*?)(?=\n## \[|\Z)', content, re.DOTALL)
          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write("notes<<EOF_NOTES\n")
              out.write(notes + "\n")
              out.write("EOF_NOTES\n")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
