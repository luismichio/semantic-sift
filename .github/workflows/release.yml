name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write   # needed to create GitHub Release
      id-token: write   # needed for trusted PyPI publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv pip install -e ".[dev]" --system

      # Gate: all checks must pass before publishing
      - name: Lint — ruff
        run: python -m ruff check .

      - name: Type check — mypy
        run: python -m mypy semantic_sift/ telemetry_core.py sift_kernel.py server.py sift_hook.py

      - name: Test — pytest
        run: python -m pytest --tb=short -q

      - name: Build distribution
        run: |
          uv pip install build --system
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Configure trusted publisher at: https://pypi.org/manage/project/semantic-sift/settings/publishing/

      - name: Extract changelog section for release notes
        id: changelog
        run: |
          # Extract the most recent versioned section from CHANGELOG.md
          python - <<'EOF'
          import re, os
          with open("doc/CHANGELOG.md") as f:
              content = f.read()
          # Match first versioned section (## [x.y.z] ...)
          match = re.search(r'(## \[\d+\.\d+\.\d+\].*?)(?=\n## \[|\Z)', content, re.DOTALL)
          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              # Multiline output
              out.write("notes<<EOF_NOTES\n")
              out.write(notes + "\n")
              out.write("EOF_NOTES\n")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
